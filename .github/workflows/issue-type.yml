name: Set issue type

# Mapeia a label aplicada pelo template (bug/enhancement/chore) para o campo
# nativo "Type" da issue, que os templates de issue não conseguem preencher.
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  set-type:
    runs-on: ubuntu-latest
    steps:
      - name: Mapear label -> Issue Type
        id: map
        env:
          LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
        run: |
          case ",$LABELS," in
            *,bug,*) echo "type=Bug" >> "$GITHUB_OUTPUT" ;;
            *,enhancement,*) echo "type=Feature" >> "$GITHUB_OUTPUT" ;;
            *,chore,*) echo "type=Task" >> "$GITHUB_OUTPUT" ;;
            *) echo "type=" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Aplicar Issue Type via GraphQL
        if: steps.map.outputs.type != ''
        uses: actions/github-script@v7
        with:
          script: |
            const typeName = '${{ steps.map.outputs.type }}';
            const org = context.repo.owner;

            const { organization } = await github.graphql(
              `query($org: String!) {
                organization(login: $org) {
                  issueTypes(first: 20) { nodes { id name } }
                }
              }`,
              { org },
            );

            const type = organization.issueTypes.nodes.find((t) => t.name === typeName);
            if (!type) {
              core.warning(`Issue type "${typeName}" não encontrado na organização ${org}`);
              return;
            }

            await github.graphql(
              `mutation($issueId: ID!, $typeId: ID!) {
                updateIssue(input: { id: $issueId, issueTypeId: $typeId }) { issue { id } }
              }`,
              { issueId: context.payload.issue.node_id, typeId: type.id },
            );
