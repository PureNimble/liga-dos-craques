name: Deploy (Supabase)

# Aplica migrações da base de dados e faz deploy das Edge Functions em cada
# push para main. O frontend é tratado automaticamente pela Vercel.
on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-supabase
  cancel-in-progress: false

jobs:
  supabase:
    name: Migrações + Edge Functions
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Ligar ao projeto
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Aplicar migrações
        run: supabase db push

      - name: Deploy das Edge Functions
        run: supabase functions deploy health --project-ref "$PROJECT_REF"
