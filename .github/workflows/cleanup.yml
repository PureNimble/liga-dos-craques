name: Limpeza da base de dados

# Apaga dados efémeros que já não dizem nada: avisos lidos há muito, eventos de
# tracking fora da janela de 180 dias, sessões de desafio penduradas e sorteios
# de golo icónico abandonados. O histórico (XP, jogos, eventos, conquistas)
# nunca é tocado — ver `purge_stale_data()` em supabase/migrations.
#
# Requer o segredo SUPABASE_SERVICE_ROLE_KEY (Project Settings → API) além do
# SUPABASE_PROJECT_REF já usado pelo keep-alive.
on:
  schedule:
    - cron: '0 4 * * 1' # Segundas, 04:00 UTC
  workflow_dispatch: {}

jobs:
  purge:
    name: Correr purge_stale_data()
    runs-on: ubuntu-latest
    steps:
      - name: Chamar a RPC de limpeza
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          URL="https://${PROJECT_REF}.supabase.co/rest/v1/rpc/purge_stale_data"
          echo "Limpeza → $URL"
          code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' -X POST "$URL" \
            -H "apikey: ${SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "HTTP $code"
          cat /tmp/resp.json || true
          test "$code" = "200"
