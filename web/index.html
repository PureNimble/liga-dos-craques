<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Aplica o tema guardado antes do primeiro paint (sem isto, a app pintava
      // sempre a escuro por uma fração de segundo antes do React montar).
      (function () {
        try {
          var stored = localStorage.getItem('peladinhas-theme');
          if (stored === 'light' || stored === 'dark') {
            document.documentElement.setAttribute('data-theme', stored);
          }
        } catch (e) {
          /* localStorage indisponível (modo privado) - mantém-se o tema por omissão. */
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#08090c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Peladinhas" />
    <title>Peladinhas ⚽</title>
    <meta
      name="description"
      content="Plataforma de futebol entre amigos: jogos, estatísticas, rankings, desafios e evolução."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
