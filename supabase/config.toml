# Configuração do projeto Supabase (backend as code).
# project_id deve corresponder ao "reference id" do projeto remoto
# (Painel Supabase → Project Settings → General → Reference ID).
project_id = "liga-dos-craques"

[api]
enabled = true
# Portas na gama 443xx: abaixo do intervalo dinâmico do Windows (49152+), onde
# o Hyper-V/winnat reserva blocos a cada arranque e o Docker deixa de conseguir
# publicar as portas. As gamas 543xx e 553xx caíam lá dentro.
port = 44321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 44322
shadow_port = 44320
major_version = 15

[studio]
enabled = true
port = 44323

[inbucket]
enabled = true
port = 44324

[auth]
enabled = true
# URL base do site para links de confirmação/recuperação (ajustar ao domínio Vercel).
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
# App entre amigos: NÃO exigir confirmação de email (limites de envio muito
# baixos no plano gratuito bloqueariam o registo/login). Ver docs/AUTH-SEM-EMAIL.md.
# NOTA: em produção isto controla-se no painel (Authentication → Email), não aqui.
enable_confirmations = false

[functions.health]
verify_jwt = false  # endpoint público de saúde, usado pelo keep-alive

[functions.send-push]
verify_jwt = false  # chamada pelo trigger via pg_net, autenticado por segredo partilhado

[analytics]
enabled = false
